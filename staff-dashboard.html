<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cue Staff Dashboard</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(212,175,55,0.08), transparent 35%),
        linear-gradient(180deg, #0d0c0f 0%, #08080a 100%);
      color: #f6e6bb;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 22px 60px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .brand-block h1 {
      margin: 0;
      font-size: 42px;
      color: #fff0c7;
      letter-spacing: 1px;
    }

    .subtext {
      color: #b7a377;
      margin-top: 8px;
      font-size: 16px;
    }

    .top-actions {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 800;
    }

    .refresh-btn {
      background: #1d1b20;
      color: #f5e8c4;
      border: 1px solid rgba(212,175,55,0.18);
    }

    .refresh-btn:hover {
      border-color: rgba(212,175,55,0.45);
    }

    .fullscreen-btn {
      background: #ddb455;
      color: #17130b;
    }

    .fullscreen-btn:hover {
      opacity: 0.95;
    }

    .status-pill {
      display: inline-block;
      background: rgba(74,255,149,0.08);
      color: #89f0b1;
      border: 1px solid rgba(74,255,149,0.25);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
    }

    .error-box {
      display: none;
      background: #5c1f1f;
      color: #ffd3d3;
      border: 1px solid #8b2f2f;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 18px;
    }

    .empty-state {
      background: rgba(255,255,255,0.02);
      border: 1px dashed rgba(212,175,55,0.22);
      border-radius: 22px;
      padding: 40px 24px;
      text-align: center;
      color: #bda87b;
    }

    .calls-list {
      display: grid;
      gap: 16px;
    }

    .call-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(212,175,55,0.18);
      border-radius: 22px;
      padding: 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
      box-shadow: 0 16px 50px rgba(0,0,0,0.28);
    }

    .call-left {
      display: flex;
      flex-direction: column;
      gap: 7px;
      min-width: 260px;
      flex: 1;
    }

    .active-badge {
      display: inline-block;
      background: rgba(221, 180, 85, 0.12);
      color: #f0c55d;
      border: 1px solid rgba(221, 180, 85, 0.35);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      width: fit-content;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    .table-name {
      font-size: 34px;
      font-weight: 800;
      color: #fff0c7;
      line-height: 1.2;
    }

    .meta {
      color: #c7b183;
      font-size: 18px;
      line-height: 1.5;
    }

    .waiting {
      color: #f0be50;
      font-weight: 800;
    }

    .clear-btn {
      background: #ddb455;
      color: #17130b;
      min-width: 140px;
      min-height: 64px;
      font-size: 22px;
      font-weight: 900;
    }

    .clear-btn:hover {
      opacity: 0.95;
    }

    .clear-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .footer-note {
      margin-top: 22px;
      color: #8e7c56;
      font-size: 14px;
    }

    @media (max-width: 640px) {
      .table-name {
        font-size: 26px;
      }

      .meta {
        font-size: 16px;
      }

      .call-card {
        align-items: flex-start;
      }

      .clear-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="brand-block">
        <h1>ACTIVE CALLS</h1>
        <div class="subtext">Full-screen waiter view for TV, iPad, or service station.</div>
      </div>

      <div class="top-actions">
        <div class="status-pill" id="lastUpdated">Last updated: --</div>
        <button class="refresh-btn" id="refreshBtn">Refresh</button>
        <button class="fullscreen-btn" id="fullscreenBtn">Full screen</button>
      </div>
    </div>

    <div class="error-box" id="errorBox"></div>

    <div id="content"></div>

    <div class="footer-note">
      Auto-refresh every 2 seconds
    </div>
  </div>

  <script>
    const API_BASE_URL = "https://cue-backend-v2.onrender.com";

    const contentEl = document.getElementById("content");
    const errorBoxEl = document.getElementById("errorBox");
    const refreshBtnEl = document.getElementById("refreshBtn");
    const fullscreenBtnEl = document.getElementById("fullscreenBtn");
    const lastUpdatedEl = document.getElementById("lastUpdated");

    function showError(message) {
      errorBoxEl.style.display = "block";
      errorBoxEl.textContent = message;
    }

    function hideError() {
      errorBoxEl.style.display = "none";
      errorBoxEl.textContent = "";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatTime(isoString) {
      if (!isoString) return "-";
      const date = new Date(isoString);

      return date.toLocaleString("fi-FI", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
      });
    }

    function formatAgo(isoString) {
      if (!isoString) return "-";

      const now = new Date();
      const created = new Date(isoString);
      const diffMs = now - created;
      const diffSec = Math.floor(diffMs / 1000);

      if (diffSec < 60) return `${diffSec}s`;
      const diffMin = Math.floor(diffSec / 60);
      if (diffMin < 60) return `${diffMin} min`;
      const diffHr = Math.floor(diffMin / 60);
      return `${diffHr} h`;
    }

    function renderCalls(calls) {
      if (!calls || calls.length === 0) {
        contentEl.innerHTML = `
          <div class="empty-state">
            <h2 style="margin-top: 0; color: #fff0c7;">No active calls</h2>
            <p style="margin-bottom: 0;">All tables are clear right now.</p>
          </div>
        `;
        return;
      }

      const cardsHtml = calls.map((call) => {
        const tableName = call.restaurant_tables?.name || "Unknown table";
        const coverageArea = call.coverage_area_name ? ` — ${call.coverage_area_name}` : "";

        return `
          <div class="call-card">
            <div class="call-left">
              <div class="active-badge">ACTIVE</div>
              <div class="table-name">${escapeHtml(tableName)}${escapeHtml(coverageArea)}</div>
              <div class="meta">Created: ${escapeHtml(formatTime(call.created_at))}</div>
              <div class="meta">Waiting: <span class="waiting">${escapeHtml(formatAgo(call.created_at))}</span></div>
              <div class="meta">Call ID: ${escapeHtml(call.id)}</div>
            </div>

            <div>
              <button
                class="clear-btn"
                onclick="clearCall('${escapeHtml(call.id)}', this)"
              >
                Clear
              </button>
            </div>
          </div>
        `;
      }).join("");

      contentEl.innerHTML = `<div class="calls-list">${cardsHtml}</div>`;
    }

    async function fetchCalls() {
      try {
        hideError();

        const response = await fetch(`${API_BASE_URL}/calls`);
        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.error || "Failed to fetch calls");
        }

        renderCalls(result.calls || []);
        lastUpdatedEl.textContent = `Last updated: ${new Date().toLocaleTimeString("fi-FI")}`;
      } catch (error) {
        console.error("fetchCalls failed:", error);
        showError(error.message || "Failed to fetch calls");
      }
    }

    async function clearCall(callId, buttonEl) {
      try {
        hideError();
        buttonEl.disabled = true;
        buttonEl.textContent = "Clearing...";

        const response = await fetch(`${API_BASE_URL}/calls/${callId}/clear`, {
          method: "POST",
        });

        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.error || "Failed to clear call");
        }

        await fetchCalls();
      } catch (error) {
        console.error("clearCall failed:", error);
        showError(error.message || "Failed to clear call");
        buttonEl.disabled = false;
        buttonEl.textContent = "Clear";
      }
    }

    async function enterFullscreen() {
      try {
        const el = document.documentElement;
        if (el.requestFullscreen) {
          await el.requestFullscreen();
        }
      } catch (error) {
        console.error("Fullscreen failed:", error);
      }
    }

    refreshBtnEl.addEventListener("click", fetchCalls);
    fullscreenBtnEl.addEventListener("click", enterFullscreen);

    fetchCalls();
    setInterval(fetchCalls, 2000);
  </script>
</body>
</html>
