<!DOCTYPE html>
<html>
<head>
<title>Cue Admin - Calls</title>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
}

.sidebar{
width:220px;
background:#111;
color:white;
height:100vh;
padding:20px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
margin:15px 0;
}

.main{
flex:1;
padding:20px;
}

.call{
background:#f4f4f4;
padding:15px;
margin-bottom:10px;
border-radius:8px;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
background:#111;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>Cue Admin</h2>

<a href="/admin-calls.html">Calls</a>
<a href="/admin-tables-buttons.html">Tables</a>
<a href="#">Buttons</a>
<a href="#">Settings</a>

<hr>

<a href="/admin-login.html">Logout</a>

</div>

<div class="main">

<h2>Active Calls</h2>

<div id="calls"></div>

</div>

<script>

async function loadCalls(){

const res = await fetch("/calls")
const data = await res.json()

console.log("API DATA:", data)

const container = document.getElementById("calls")

if(!container){
console.error("calls container not found")
return
}

container.innerHTML = ""

const calls = data.calls || []

calls.forEach(call => {

const div = document.createElement("div")
div.className = "call"

const tableName = call.restaurant_tables?.name || "Unknown table"

div.innerHTML = `
<div>
<strong>${tableName}</strong>
<br>
${new Date(call.created_at).toLocaleTimeString()}
</div>

<button onclick="clearCall('${call.id}')">
Clear
</button>
`

container.appendChild(div)

})

}

async function clearCall(id){

await fetch(`/calls/${id}/clear`,{
method:"POST"
})

loadCalls()

}

loadCalls()

setInterval(loadCalls,3000)

</script>

</body>
</html>
