<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cue Login</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(212,175,55,0.10), transparent 35%),
        linear-gradient(180deg, #0d0c0f 0%, #08080a 100%);
      color: #f5e7c1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: linear-gradient(180deg, rgba(20,20,24,0.95), rgba(15,15,18,0.95));
      border: 1px solid rgba(212,175,55,0.18);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 18px 60px rgba(0,0,0,0.28);
    }

    .brand {
      font-size: 40px;
      font-weight: 800;
      letter-spacing: 3px;
      color: #e1be61;
      margin-bottom: 8px;
    }

    .title {
      font-size: 30px;
      font-weight: 800;
      color: #fff1ca;
      margin: 0 0 10px;
    }

    .sub {
      color: #bca882;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #d5c29a;
      font-size: 14px;
      font-weight: 700;
    }

    input {
      width: 100%;
      min-height: 48px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(212,175,55,0.18);
      background: #121216;
      color: #f5e7c1;
      font-size: 15px;
    }

    button {
      width: 100%;
      min-height: 50px;
      border: none;
      border-radius: 12px;
      background: #ddb455;
      color: #17130b;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 8px;
    }

    button:hover {
      opacity: 0.95;
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .error {
      display: none;
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #5b1f1f;
      color: #ffd5d5;
      border: 1px solid #8e3030;
    }

    .info {
      margin-top: 16px;
      color: #9e8b65;
      font-size: 13px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">CUE</div>
    <h1 class="title">Restaurant Login</h1>
    <div class="sub">Sign in to access your restaurant dashboard.</div>

    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="email" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" required />
      </div>

      <button id="loginButton" type="submit">Log in</button>
    </form>

    <div id="errorBox" class="error"></div>

    <div class="info">
      Demo login for restaurant admins. After login, you will be redirected to the admin dashboard.
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://xbgvfbyhzvpwwpfwhhci.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhiZ3ZmYnloenZwd3dwZndoaGNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNDY4OTAsImV4cCI6MjA4ODcyMjg5MH0.6YqNyXxJdxJuW3hg_ACulJaNEzJAGBwRbJKDNQVSjuk";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const loginForm = document.getElementById("loginForm");
    const loginButton = document.getElementById("loginButton");
    const errorBox = document.getElementById("errorBox");

    function showError(message) {
      errorBox.style.display = "block";
      errorBox.textContent = message;
    }

    function hideError() {
      errorBox.style.display = "none";
      errorBox.textContent = "";
    }

    async function redirectIfLoggedIn() {
      const { data, error } = await supabase.auth.getSession();

      if (error) {
        return;
      }

      if (data?.session) {
        window.location.href = "/admin-dashboard.html";
      }
    }

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      hideError();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      loginButton.disabled = true;
      loginButton.textContent = "Logging in...";

      try {
        const { error } = await supabase.auth.signInWithPassword({
          email,
          password,
        });

        if (error) {
          throw error;
        }

        window.location.href = "/admin-dashboard.html";
      } catch (error) {
        console.error(error);
        showError(error.message || "Login failed");
      } finally {
        loginButton.disabled = false;
        loginButton.textContent = "Log in";
      }
    });

    redirectIfLoggedIn();
  </script>
</body>
</html>
